name: Build MakeHDR

on:
#   push:
#     branches: [ main ]
#   pull_request:
#     branches: [ main ]
  workflow_dispatch:

env:
  LOCAL_PLUGIN_PATH: "${{ github.workspace }}/install"

jobs:
  
  linux:
    name: '${{ matrix.os }} ${{ matrix.arch-type }}'
    runs-on: ${{ matrix.os }}
    strategy:
      #fail-fast: false
      matrix:
        include:
          - os: "ubuntu-22.04" # ubuntu-latest
            arch: x86_64
            arch-type: Intel
            build-type: "Release"
    steps:

      # Build with GCC 9 to ensure plugin compatibility with Nuke 14-16+
      - name: Install GCC 9
        run: |
          sudo apt-get update
          sudo apt-get install -y software-properties-common
          sudo add-apt-repository ppa:ubuntu-toolchain-r/test -y
          sudo apt-get update
          sudo apt-get install -y gcc-9 g++-9

      - name: Set GCC 9 as default
        run: |
          sudo update-alternatives --install /usr/bin/gcc gcc /usr/bin/gcc-9 90
          sudo update-alternatives --install /usr/bin/g++ g++ /usr/bin/g++-9 90
          gcc --version
          g++ --version

      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Configure MakeHDR
        run: |
          mkdir build
          cd build
          cmake --version
          cmake -DOFX_PLUGIN_PATH=${{ env.LOCAL_PLUGIN_PATH }} -DCMAKE_POLICY_VERSION_MINIMUM=3.5 -DCMAKE_C_COMPILER=gcc-9 -DCMAKE_CXX_COMPILER=g++-9 ..

      - name: Build MakeHDR
        run: |
          cd build
          cmake --build . --parallel

      - name: Install MakeHDR
        run: |
          cd build
          cmake --install .
  
      - name: Upload MakeHDR bundle
        uses: actions/upload-artifact@v4
        with:
          name: MakeHDR-${{ matrix.os }}-${{ matrix.arch }}
          path: ${{ env.LOCAL_PLUGIN_PATH }}
          retention-days: 14

  macos:
    name: '${{ matrix.os }} ${{ matrix.arch-type }}'
    runs-on: ${{ matrix.os }}
    strategy:
      #fail-fast: false
      matrix:
        include:
          - os: "macos-14"
            arch: arm64
            arch-type: Apple Silicon
            build-type: "Release"
          - os: "macos-14"
            arch: x86_64
            arch-type: Intel
            build-type: "Release"
    steps:

      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Configure MakeHDR for Intel
        if: matrix.arch == 'x86_64'
        run: |
          mkdir build
          cd build
          cmake -DOFX_PLUGIN_PATH=${{ env.LOCAL_PLUGIN_PATH }} -DCMAKE_POLICY_VERSION_MINIMUM=3.5 -DCMAKE_OSX_DEPLOYMENT_TARGET=10.13 -DCMAKE_OSX_ARCHITECTURES=x86_64 ..

      - name: Configure MakeHDR for ARM
        if: matrix.arch == 'arm64'
        run: |
          mkdir build
          cd build
          cmake -DOFX_PLUGIN_PATH=${{ env.LOCAL_PLUGIN_PATH }} -DCMAKE_POLICY_VERSION_MINIMUM=3.5 -DCMAKE_OSX_DEPLOYMENT_TARGET=11.0 -DCMAKE_OSX_ARCHITECTURES=arm64 ..

      - name: Build MakeHDR
        run: |
          cd build
          cmake --build . --parallel

      - name: Install MakeHDR
        run: |
          cd build
          cmake --install .
  
      - name: Fix Permissions
        run: |
          xattr -cr ${{ env.LOCAL_PLUGIN_PATH }}/make_hdr.ofx.bundle

      - name: Upload MakeHDR bundle
        uses: actions/upload-artifact@v4
        with:
          name: MakeHDR-${{ matrix.os }}-${{ matrix.arch }}
          path: ${{ env.LOCAL_PLUGIN_PATH }}
          retention-days: 14

  windows:
    name: '${{ matrix.os }} ${{ matrix.arch-type }}'
    strategy:
      #fail-fast: false
      matrix:
        include:
          - os: "windows-2022"
            arch-type: Intel
            arch: "x86_64"
            build-type: "Release"

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Configure MakeHDR (VS2022)
        if: matrix.os == 'windows-2022'
        run: |
          mkdir build
          cd build
          cmake --version
          cmake -DOFX_PLUGIN_PATH=${{ env.LOCAL_PLUGIN_PATH }} -G "Visual Studio 17 2022" -A x64 ..

      - name: Build MakeHDR
        run: |
          cd build
          cmake --build . --parallel --config ${{ matrix.build-type }}
        
      - name: Install MakeHDR
        run: |
          cd build
          cmake --install . --config ${{ matrix.build-type }}
  
      - name: Upload MakeHDR bundle
        uses: actions/upload-artifact@v4
        with:
          name: MakeHDR-${{ matrix.os }}-${{ matrix.arch }}
          path: ${{ env.LOCAL_PLUGIN_PATH }}
          retention-days: 14
